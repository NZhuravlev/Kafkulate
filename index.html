<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafkulate — Kafka Partition Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #8a8a9a;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #9a9ab0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent, #ffffff);
      box-shadow: 0 0 0 3px var(--accent-glow, rgba(255, 255, 255, 0.15));
    }

    input::placeholder {
      color: #555;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }


    .result {
      margin-top: 32px;
      text-align: center;
      transition: opacity 0.3s;
    }

    .result.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .partition-number {
      margin-bottom: 16px;
    }

    .partition-number .label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a8a9a;
      margin-bottom: 4px;
    }

    .partition-number .value {
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent, #ffffff);
      line-height: 1;
      transition: color 0.3s;
    }

    .details {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 4px 0;
      color: #7a7a8a;
    }

    .detail-row span:last-child {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #a0a0b0;
    }

    .error {
      margin-top: 20px;
      text-align: center;
      color: #ff6b6b;
      font-size: 0.85rem;
      transition: opacity 0.3s;
    }

    .error.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kafkulate</h1>
    <p class="subtitle">Kafka Partition Calculator</p>

    <div class="input-group">
      <label for="key">Message Key</label>
      <input type="text" id="key" placeholder="Enter message key..." autofocus>
    </div>

    <div class="input-group">
      <label for="partitions">Number of Partitions</label>
      <input type="number" id="partitions" value="30" min="1">
    </div>

    <div id="result" class="result hidden">
      <div class="partition-number">
        <span class="label">Partition</span>
        <span class="value" id="partition-value">&mdash;</span>
      </div>
      <div class="details">
        <div class="detail-row">
          <span>murmur2 hash</span>
          <span id="hash-value">&mdash;</span>
        </div>
        <div class="detail-row">
          <span>toPositive</span>
          <span id="positive-value">&mdash;</span>
        </div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script>
    function murmur2(data) {
      const length = data.length;
      const seed = 0x9747b28c;
      const m = 0x5bd1e995;
      const r = 24;

      let h = seed ^ length;
      const length4 = length >>> 2;

      for (let i = 0; i < length4; i++) {
        const i4 = i * 4;
        let k = (data[i4] & 0xff)
               | ((data[i4 + 1] & 0xff) << 8)
               | ((data[i4 + 2] & 0xff) << 16)
               | ((data[i4 + 3] & 0xff) << 24);

        k = Math.imul(k, m);
        k ^= k >>> r;
        k = Math.imul(k, m);

        h = Math.imul(h, m);
        h ^= k;
      }

      const offset = length4 * 4;
      const extra = length & 3;
      if (extra >= 3) h ^= (data[offset + 2] & 0xff) << 16;
      if (extra >= 2) h ^= (data[offset + 1] & 0xff) << 8;
      if (extra >= 1) {
        h ^= (data[offset] & 0xff);
        h = Math.imul(h, m);
      }

      h ^= h >>> 13;
      h = Math.imul(h, m);
      h ^= h >>> 15;

      return h | 0;
    }

    function toPositive(hash) {
      return hash & 0x7fffffff;
    }

    function getPartition(key, numPartitions) {
      const encoder = new TextEncoder();
      const keyBytes = encoder.encode(key);
      const hash = murmur2(keyBytes);
      const positive = toPositive(hash);
      return {
        hash: hash,
        positive: positive,
        partition: positive % numPartitions
      };
    }

    const keyInput = document.getElementById('key');
    const partitionsInput = document.getElementById('partitions');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');
    const partitionValue = document.getElementById('partition-value');
    const hashValue = document.getElementById('hash-value');
    const positiveValue = document.getElementById('positive-value');

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
    }

    function hideError() {
      errorDiv.classList.add('hidden');
    }

    function showResult(result) {
      const numPartitions = Number(partitionsInput.value);
      const hue = Math.round((result.partition / numPartitions) * 360);
      document.documentElement.style.setProperty('--accent', `hsl(${hue}, 75%, 60%)`);
      document.documentElement.style.setProperty('--accent-glow', `hsla(${hue}, 75%, 60%, 0.15)`);
      partitionValue.textContent = result.partition;
      hashValue.textContent = result.hash;
      positiveValue.textContent = result.positive;
      resultDiv.classList.remove('hidden');
    }

    function hideResult() {
      resultDiv.classList.add('hidden');
      document.documentElement.style.setProperty('--accent', '#ffffff');
      document.documentElement.style.setProperty('--accent-glow', 'rgba(255, 255, 255, 0.15)');
    }

    function calculate() {
      const key = keyInput.value;
      const partitionsRaw = partitionsInput.value;

      if (!key) {
        hideError();
        hideResult();
        return;
      }

      const partitions = Number(partitionsRaw);
      if (!partitionsRaw || isNaN(partitions) || !Number.isInteger(partitions)) {
        showError('Partitions must be a whole number');
        hideResult();
        return;
      }
      if (partitions <= 0) {
        showError('Partitions must be at least 1');
        hideResult();
        return;
      }

      hideError();
      showResult(getPartition(key, partitions));
    }

    keyInput.addEventListener('input', calculate);
    partitionsInput.addEventListener('input', calculate);
  </script>
</body>
</html>
